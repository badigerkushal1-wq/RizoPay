<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RizoPay - Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="top-nav">
    <div class="brand-logo">👤 My Profile</div>
  </div>

  <div style="padding: 16px;">
    <!-- Profile Card -->
    <div class="card" style="display: flex; align-items: center; gap: 16px;">
      <div style="width: 50px; height: 50px; border-radius: 50%; background: var(--accent-gold); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: #000;">
        RP
      </div>
      <div>
        <h3 id="profId">ID: RP839210</h3>
        <p style="font-size: 0.8rem; color: var(--text-sub);" id="profPhone">+91 9876543210</p>
      </div>
    </div>

    <!-- Withdrawal Accounts Section -->
    <div class="card">
      <h4 style="margin-bottom: 12px; color: var(--accent-gold);">Withdrawal Accounts Setup</h4>
      <select class="input-field" id="withdrawMethod">
        <option value="MobiKwik">MobiKwik</option>
        <option value="Amazon Pay">Amazon Pay</option>
        <option value="Slice">Slice</option>
        <option value="Navi">Navi</option>
      </select>
      <input type="text" class="input-field" placeholder="Mobile / Account Number">
      <input type="text" class="input-field" placeholder="UPI ID">
      <button class="btn-primary" onclick="alert('Withdrawal account saved successfully!')">Save Account</button>
    </div>

    <!-- Action Options -->
    <div class="card" style="display: flex; flex-direction: column; gap: 12px; font-size: 0.9rem;">
      <div style="display: flex; justify-content: space-between;" onclick="alert('Newbie Reward: ₹250 Claimed')">
        <span>🎁 Newbie Reward</span><span>₹250</span>
      </div>
      <hr style="border-color: var(--border-color);">
      <div style="display: flex; justify-content: space-between;">
        <span>📜 Order History</span><span>›</span>
      </div>
      <hr style="border-color: var(--border-color);">
      <div style="display: flex; justify-content: space-between;">
        <span>💸 Sell / Withdrawal History</span><span>›</span>
      </div>
      <hr style="border-color: var(--border-color);">
      <div style="display: flex; justify-content: space-between;" onclick="alert('Option to reset Payment PIN sent via SMS')">
        <span>🔐 Reset Payment PIN</span><span>›</span>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">🏠<span>Home</span></a>
    <a href="orders.html" class="nav-item">📈<span>Orders</span></a>
    <a href="team.html" class="nav-item">👥<span>Team</span></a>
    <a href="mine.html" class="nav-item active">👤<span>Mine</span></a>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
